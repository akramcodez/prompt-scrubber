name: Update Badges

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'
  release:
    types: [published]

jobs:
  generate-badges:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Coverage Report
        run: pnpm run test:coverage || true

      - name: Generate Badges
        run: |
          mkdir -p badges

          # Check for coverage/coverage-summary.json and extract percentage
          if [ -f coverage/coverage-summary.json ]; then
            PCT=$(jq '.total.lines.pct' coverage/coverage-summary.json)
          else
            PCT="null"
          fi

          if [ "$PCT" = "null" ] || [ -z "$PCT" ]; then
            COVERAGE_LABEL="n%2Fa"
            COLOR="lightgrey"
            PCT_INT="N/A"
          else
            # Round the percentage to nearest integer
            PCT_INT=$(printf "%.0f" "$PCT" 2>/dev/null || echo "${PCT%%.*}")
            COVERAGE_LABEL="${PCT_INT}%25"
            if [ "$PCT_INT" -lt 50 ]; then
              COLOR="red"
            elif [ "$PCT_INT" -lt 90 ]; then
              COLOR="yellow"
            else
              COLOR="green"
            fi
          fi

          echo "Coverage Percentage: ${PCT_INT}"
          echo "Coverage Color: ${COLOR}"

          # Fetch SVG badges using curl
          curl -s -o badges/build.svg "https://img.shields.io/github/actions/workflow/status/Nano-Collective/prompt-scrubber/pr-checks.yml?branch=main&style=for-the-badge&logo=github"
          curl -s -o badges/coverage.svg "https://img.shields.io/badge/coverage-${COVERAGE_LABEL}-${COLOR}?style=for-the-badge&logo=codecov"
          curl -s -o badges/npm-version.svg "https://img.shields.io/npm/v/@nanocollective/prompt-scrub?style=for-the-badge&logo=npm"
          curl -s -o badges/npm-downloads-monthly.svg "https://img.shields.io/npm/dm/@nanocollective/prompt-scrub?style=for-the-badge&logo=npm"
          curl -s -o badges/npm-license.svg "https://img.shields.io/npm/l/@nanocollective/prompt-scrub?style=for-the-badge&logo=npm"
          curl -s -o badges/repo-size.svg "https://img.shields.io/github/repo-size/Nano-Collective/prompt-scrubber?style=for-the-badge&logo=github"
          curl -s -o badges/stars.svg "https://img.shields.io/github/stars/Nano-Collective/prompt-scrubber?style=for-the-badge&logo=github"
          curl -s -o badges/forks.svg "https://img.shields.io/github/forks/Nano-Collective/prompt-scrubber?style=for-the-badge&logo=github"

      - name: Commit and Push Badges
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add badges/ README.md
          if git diff --cached --quiet; then
            echo "No badge updates or README changes detected."
          else
            git commit -m "Update status badges [skip ci]"
            git push origin main
          fi
